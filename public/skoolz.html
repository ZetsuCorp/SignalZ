<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Community Hustle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#050508;overflow:hidden;}
#wrap{position:relative;width:100vw;height:100vh;}
#gc{display:block;width:100%;height:100%;}
#over,#dead{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,0.93);z-index:10;
}
#dead{display:none;}
h1{font:900 52px 'Courier New',monospace;color:#00ffcc;letter-spacing:6px;margin-bottom:6px;}
.sub{font:12px monospace;color:rgba(255,255,255,0.3);margin-bottom:28px;letter-spacing:3px;}
#dead h2{font:900 42px monospace;color:#ff4455;margin-bottom:8px;}
#avatarWrap{position:relative;width:100px;height:100px;margin-bottom:18px;cursor:pointer;}
#avatarRing{width:100px;height:100px;border-radius:50%;border:2px dashed rgba(0,255,204,0.4);display:flex;align-items:center;justify-content:center;overflow:hidden;background:rgba(0,255,204,0.04);transition:border-color .2s;position:relative;}
#avatarWrap:hover #avatarRing{border-color:#00ffcc;}
#avatarPreview{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:none;}
#avatarHint{font:11px monospace;color:rgba(255,255,255,0.32);text-align:center;line-height:1.7;pointer-events:none;}
#avatarFile{display:none;}
#avatarClear{display:none;position:absolute;top:-2px;right:-2px;width:22px;height:22px;border-radius:50%;background:#ff4455;border:none;color:#fff;font:700 13px monospace;cursor:pointer;line-height:22px;text-align:center;padding:0;}
#avatarClear:hover{background:#ff2233;}
#nameIn{background:rgba(255,255,255,0.06);border:1px solid rgba(0,255,204,0.25);color:#fff;padding:11px 20px;font:16px monospace;border-radius:3px;width:240px;text-align:center;outline:none;margin-bottom:14px;}
#nameIn:focus{border-color:#00ffcc;}
#nameIn::placeholder{color:rgba(255,255,255,0.18);}
.btn{background:#00ffcc;color:#000;border:none;padding:13px 50px;font:700 15px monospace;border-radius:3px;cursor:pointer;letter-spacing:2px;}
.btn:hover{background:#00e6b8;}
#hud{pointer-events:none;user-select:none;}
#hudPrefix{font:700 10px 'Share Tech Mono',monospace;color:#00ffcc;letter-spacing:5px;margin-bottom:4px;}
#massN{font:700 30px 'Orbitron',sans-serif;color:#ffffff;line-height:1;margin-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:10px;}
#stageN{font:700 13px 'Share Tech Mono',monospace;color:#ffffff;letter-spacing:3px;margin-bottom:5px;}
#spdN{font:700 12px 'Share Tech Mono',monospace;color:#00ffcc;letter-spacing:3px;}
#mm{position:absolute;bottom:16px;right:16px;border:1px solid rgba(255,255,255,0.1);}
#officeToggle{
  position:absolute;top:16px;left:18px;margin-top:0;pointer-events:all;
  background:rgba(0,0,0,0.88);border:1px solid rgba(0,255,204,0.3);
  border-radius:8px;padding:12px 20px 14px 16px;min-width:240px;
  cursor:default;
}
#officeBtn{
  display:block;width:100%;margin-top:10px;padding:6px 0;
  background:rgba(0,255,204,0.1);border:1px solid rgba(0,255,204,0.3);
  border-radius:4px;color:#00ffcc;font:700 9px 'Share Tech Mono',monospace;
  letter-spacing:3px;cursor:pointer;pointer-events:all;text-align:center;
}
#officeBtn:hover{background:rgba(0,255,204,0.2);}
#officePanel{
  display:none;margin-top:8px;border-top:1px solid rgba(255,255,255,0.08);
  padding-top:8px;
}
.hire-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:7px;
}
.hire-name{font:700 10px 'Share Tech Mono',monospace;color:#fff;letter-spacing:2px;flex:1;}
.hire-cost{font:700 10px 'Share Tech Mono',monospace;color:#00ffcc;margin:0 8px;}
.hire-count{font:700 9px 'Share Tech Mono',monospace;color:rgba(255,255,255,0.4);margin-right:4px;}
.hire-btn{
  padding:3px 10px;background:rgba(0,255,204,0.12);
  border:1px solid rgba(0,255,204,0.35);border-radius:3px;
  color:#00ffcc;font:700 9px 'Share Tech Mono',monospace;
  cursor:pointer;pointer-events:all;letter-spacing:1px;
}
.hire-btn:hover{background:rgba(0,255,204,0.25);}
.hire-btn:disabled{opacity:0.3;cursor:not-allowed;}
#accountantBar{
  height:3px;background:rgba(0,255,204,0.15);border-radius:2px;margin-top:4px;
}
#accountantFill{height:100%;background:#00ffcc;border-radius:2px;width:0%;transition:width 0.3s;}
#bossAlert{
  display:none;position:absolute;top:80px;left:50%;transform:translateX(-50%);
  background:rgba(180,0,40,0.92);border:1px solid #ff2244;border-radius:6px;
  padding:10px 28px;pointer-events:none;z-index:8;text-align:center;
  animation:alertSlide 0.3s ease;
}
#bossAlert .ba-title{font:900 13px 'Share Tech Mono',monospace;color:#fff;letter-spacing:5px;}
#bossAlert .ba-sub{font:700 10px 'Share Tech Mono',monospace;color:rgba(255,180,180,0.85);letter-spacing:3px;margin-top:3px;}
#revenueAlert{
  display:none;position:absolute;top:80px;left:50%;transform:translateX(-50%);
  background:rgba(0,140,80,0.92);border:1px solid #00ff88;border-radius:6px;
  padding:10px 28px;pointer-events:none;z-index:8;text-align:center;
  animation:alertSlide 0.3s ease;
}
#revenueAlert .ra-title{font:900 13px 'Share Tech Mono',monospace;color:#fff;letter-spacing:5px;}
#revenueAlert .ra-sub{font:700 10px 'Share Tech Mono',monospace;color:rgba(180,255,220,0.85);letter-spacing:3px;margin-top:3px;}
@keyframes alertSlide{from{opacity:0;top:60px;}to{opacity:1;top:80px;}}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gc"></canvas>
  <div id="officeToggle">
    <div id="hud" style="pointer-events:none;">
      <div id="hudPrefix">$$$ REVENUE</div>
      <div id="massN">0</div>
      <div id="stageN">SIDE HUSTLE</div>
      <div id="spdN">SPD —</div>
    </div>
    <button id="officeBtn">▼ OFFICE PANEL</button>
    <div id="officePanel">
      <div class="hire-row"><span class="hire-name">INTERN</span><span class="hire-cost">$800</span><span class="hire-count" id="cntIntern">0/4</span><button class="hire-btn" id="hireIntern">HIRE</button></div>
      <div class="hire-row"><span class="hire-name">CLOSER</span><span class="hire-cost">$2.5K</span><span class="hire-count" id="cntCloser">0/4</span><button class="hire-btn" id="hireCloser">HIRE</button></div>
      <div class="hire-row"><span class="hire-name">ADS TEAM</span><span class="hire-cost">$5K</span><span class="hire-count" id="cntAds">0/4</span><button class="hire-btn" id="hireAds">HIRE</button></div>
      <div class="hire-row"><span class="hire-name">COMM MGR</span><span class="hire-cost">$9K</span><span class="hire-count" id="cntCommMgr">0/4</span><button class="hire-btn" id="hireCommMgr">HIRE</button></div>
      <div class="hire-row"><span class="hire-name">ACCOUNTANT</span><span class="hire-cost">$15K</span><button class="hire-btn" id="hireAccountant">HIRE</button></div>
      <div class="hire-row"><span class="hire-name">LEGAL TEAM</span><span class="hire-cost">$35K</span><button class="hire-btn" id="hireLegal">RETAINER</button></div>
      <div id="accountantBar"><div id="accountantFill"></div></div>
    </div>
  </div>
  <canvas id="mm" width="130" height="130"></canvas>
  <div id="bossAlert">
    <div class="ba-title">⚠ CORPORATE TAKEOVER INCOMING</div>
    <div class="ba-sub">PROTECT YOUR REVENUE</div>
  </div>
  <div id="revenueAlert">
    <div class="ra-title" id="raTitle">+$0 REVENUE!</div>
    <div class="ra-sub" id="raSub">CLOSING DEALS</div>
  </div>
  <div id="over">
    <h1>COMMUNITY HUSTLE</h1>
    <div class="sub">CLOSE · DELEGATE · DOMINATE</div>
    <div id="avatarWrap" title="Click to upload image">
      <div id="avatarRing">
        <img id="avatarPreview" alt="avatar"/>
        <span id="avatarHint">TAP TO<br>ADD IMAGE</span>
      </div>
      <button id="avatarClear" title="Remove image">×</button>
    </div>
    <input type="file" id="avatarFile" accept="image/*"/>
    <input id="nameIn" placeholder="enter your name" maxlength="16"/>
    <button class="btn" id="playBtn">PLAY</button>
  </div>
  <div id="dead">
    <h2>ACQUIRED.</h2>
    <div class="sub" id="dMsg"></div>
    <button class="btn" id="rBtn">RESPAWN</button>
  </div>
</div>
<script>
(()=>{
'use strict';
const wrap=document.getElementById('wrap');
const gc=document.getElementById('gc');
const cx=gc.getContext('2d');
const mm=document.getElementById('mm');
const mc=mm.getContext('2d');
const over=document.getElementById('over');
const dead=document.getElementById('dead');
const massN=document.getElementById('massN');
const stageN=document.getElementById('stageN');
const spdN=document.getElementById('spdN');
const bossAlert=document.getElementById('bossAlert');
const revenueAlert=document.getElementById('revenueAlert');
const raTitle=document.getElementById('raTitle');
const raSub=document.getElementById('raSub');
let bossAlertShown=false;
let revenueAlertCooldown=0;
let lastMass=0;

const OBJECTIONS_FLEE=[
  "I can't afford it!","Not right now!","I need to think about it!",
  "Let me talk to my spouse!","Send me more info!","We don't have budget!",
  "Maybe next quarter!","I'm too busy right now!"
];
const OBJECTIONS_CLOSE=["OK FINE!","Deal.","Where do I sign?","...fine, take it.","You got me."];
const NULL_PROXIMITY=320;

let W,H;
function resize(){W=gc.width=wrap.offsetWidth;H=gc.height=wrap.offsetHeight;}
resize();
window.addEventListener('resize',resize);

const MAP=6400,FOOD_COUNT=2000,BOMB_COUNT=72,NULL_COUNT=88,TAU=Math.PI*2,PAD=0.14;

const CELL=128;
const GCOLS=Math.ceil(MAP/CELL);
const GROWS=Math.ceil(MAP/CELL);
let foodGrid=null;

function buildFoodGrid(){
  foodGrid=new Array(GCOLS*GROWS).fill(null).map(()=>[]);
  foods.forEach((f,i)=>{
    const gx=Math.floor(f.x/CELL);
    const gy=Math.floor(f.y/CELL);
    foodGrid[gy*GCOLS+gx].push(i);
  });
}

function foodsNear(x,y,r){
  const x0=Math.max(0,Math.floor((x-r)/CELL));
  const x1=Math.min(GCOLS-1,Math.floor((x+r)/CELL));
  const y0=Math.max(0,Math.floor((y-r)/CELL));
  const y1=Math.min(GROWS-1,Math.floor((y+r)/CELL));
  const out=[];
  for(let gy=y0;gy<=y1;gy++)for(let gx=x0;gx<=x1;gx++){
    const cell=foodGrid[gy*GCOLS+gx];
    if(cell)out.push(...cell);
  }
  return out;
}

const STAGES=[
  {name:'SIDE HUSTLE', min:0,      max:500,     speed:9,   splits:2,  cooldown:120,  zoomBase:1.10},
  {name:'STARTUP',     min:500,    max:2500,    speed:7,   splits:3,  cooldown:240,  zoomBase:0.95},
  {name:'SMALL BIZ',  min:2500,   max:8000,    speed:5,   splits:4,  cooldown:420,  zoomBase:0.72},
  {name:'LOCAL STAPLE',min:8000,   max:25000,   speed:3.5, splits:6,  cooldown:660,  zoomBase:0.52},
  {name:'COMM ANCHOR', min:25000,  max:80000,   speed:2,   splits:8,  cooldown:960,  zoomBase:0.36},
  {name:'REG BRAND',  min:80000,  max:250000,  speed:1,   splits:12, cooldown:1320, zoomBase:0.24},
  {name:'EMPIRE',     min:250000, max:800000,  speed:0.7, splits:14, cooldown:1800, zoomBase:0.18},
  {name:'LEGEND',     min:800000, max:Infinity,speed:0.4, splits:16, cooldown:2400, zoomBase:0.12},
];
function getStage(m){for(let i=STAGES.length-1;i>=0;i--)if(m>=STAGES[i].min)return STAGES[i];return STAGES[0];}

const PAL=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff9f43','#00d2d3','#fd79a8','#a29bfe','#55efc4','#fdcb6e'];
const NCOLS=['#888','#aaa','#666','#bbb','#777','#99aaaa','#aa9988'];
function rnd(a,b){return a+Math.random()*(b-a);}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function blobR(b){return Math.sqrt(Math.max(1,b.m));}

const NULL_EMOJIS=['👩💵','👨💸','🧔💶','👱💰','🧕💴','🥰💷','😕💰','😎🪙'];

// ── AVATAR ──
let canvasImg=null;
const avatarWrap=document.getElementById('avatarWrap');
const avatarPreview=document.getElementById('avatarPreview');
const avatarHint=document.getElementById('avatarHint');
const avatarFile=document.getElementById('avatarFile');
const avatarClear=document.getElementById('avatarClear');

avatarWrap.addEventListener('click',(e)=>{if(e.target===avatarClear)return;avatarFile.click();});
avatarFile.addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const url=URL.createObjectURL(file);
  avatarPreview.src=url;avatarPreview.style.display='block';
  avatarHint.style.display='none';avatarClear.style.display='block';
  canvasImg=null;
  const img=new Image();img.onload=()=>{canvasImg=img;};img.src=url;
});
avatarClear.addEventListener('click',e=>{
  e.stopPropagation();canvasImg=null;avatarPreview.src='';
  avatarPreview.style.display='none';avatarHint.style.display='block';
  avatarClear.style.display='none';avatarFile.value='';
});

function mkPts(n){return Array.from({length:n},(_,i)=>({angle:TAU/n*i,offset:rnd(-0.07,0.07),vel:rnd(-0.0018,0.0018)}));}

function mkBlob(x,y,m,mergeT){
  return{x,y,m,vx:0,vy:0,mergeT:mergeT||0,spd:getStage(m).speed,pts:mkPts(14),alive:true,
    scale:1.5,scaleVel:-0.08,sqX:1,sqY:1,dying:false,dyingT:0,dyingTargetX:0,dyingTargetY:0};
}

function mkNull(avoidX,avoidY){
  const m=rnd(300,2200);
  const heading=rnd(0,TAU);const spd=rnd(1.2,2.8);
  let sx,sy;const minDist=400;let tries=0;
  do{sx=rnd(80,MAP-80);sy=rnd(80,MAP-80);tries++;}
  while(avoidX!==undefined&&Math.hypot(sx-avoidX,sy-avoidY)<minDist&&tries<20);
  return{x:sx,y:sy,m,r:Math.sqrt(m),vx:Math.cos(heading)*spd,vy:Math.sin(heading)*spd,
    heading,headingTimer:rnd(60,180),col:NCOLS[Math.floor(Math.random()*NCOLS.length)],
    emoji:NULL_EMOJIS[Math.floor(Math.random()*NULL_EMOJIS.length)],
    pts:mkPts(12),alive:true,scale:0.05,scaleVel:0.09,
    objection:'',objectionTimer:0,objectionAlpha:0};
}

let foods=[],bombs=[],blobs=[],nullBlobs=[];
let dyingBlobs=[];
let closingTexts=[];
let pColor='#00ffcc',pName='Cell';
let mouse={x:0,y:0};
let cam={x:MAP/2,y:MAP/2,z:1};
let running=false,raf=null;

let hireCounts={intern:0,closer:0,ads:0,commMgr:0};

const HIRE_LIFESPANS={intern:1800,closer:3600,commMgr:2700};

// ── BOSS ──
const BOSS_COLOR='#cc2244';
const BOSS_START_MASS=12000;
const BOSS_DURATION=1800;
const BOSS_APPEAR=900;
const BOSS_CHASE_R=320;
const BOSS_BOMB_INTERVAL=180;
const DRAIN_BOMB_DURATION=600;
const DRAIN_RATE=6;
const BOSS_SPLIT_MASS_THRESH=20000;
const BOSS_MAX_BLOBS=6;
const BOSS_MERGE_COOLDOWN=480;

let bossBlobs=[];
let bossDyingBlobs=[];
let bossSpawnCountdown=BOSS_APPEAR;
let bossBombTimer=0;
let drainBombs=[];

function mkBossBlob(x,y,m,mergeT){
  return{x,y,m,vx:0,vy:0,mergeT:mergeT||0,spd:getStage(m).speed,
    pts:mkPts(18),alive:true,scale:0.05,scaleVel:0.08,sqX:1,sqY:1,
    roamX:MAP/2,roamY:MAP/2,roamTimer:0,bombTimer:BOSS_BOMB_INTERVAL};
}

function spawnBoss(){
  const side=Math.floor(Math.random()*4);
  let bx,by;
  if(side===0){bx=rnd(100,MAP-100);by=100;}
  else if(side===1){bx=rnd(100,MAP-100);by=MAP-100;}
  else if(side===2){bx=100;by=rnd(100,MAP-100);}
  else{bx=MAP-100;by=rnd(100,MAP-100);}
  bossBlobs=[mkBossBlob(bx,by,BOSS_START_MASS,0)];
  bossBombTimer=BOSS_BOMB_INTERVAL;
}

const MINE_SEEK_R=320,MINE_SPEED=3.8,MINE_LIFE=480,MINE_R=18;
function mkMine(x,y){return{x,y,vx:rnd(-1,1),vy:rnd(-1,1),r:MINE_R,life:MINE_LIFE,rot:rnd(0,TAU),frame:0};}

function bossTotalMass(){return bossBlobs.reduce((s,b)=>s+b.m,0);}
function bossAlive(){return bossBlobs.some(b=>b.alive);}

function drawMines(){
  drainBombs.forEach(db=>{
    db.rot=(db.rot+0.07)%TAU;
    db.frame=(db.frame+1)%8;
    const[sx,sy]=w2s(db.x,db.y);
    const sr=db.r*cam.z;
    const lifeFrac=db.life/MINE_LIFE;
    if(sx+sr+20<0||sx-sr-20>W||sy+sr+20<0||sy-sr-20>H)return;
    cx.save();
    cx.translate(sx,sy);
    cx.rotate(db.rot);
    cx.globalAlpha=0.4+lifeFrac*0.6;
    const glow=cx.createRadialGradient(0,0,sr*0.2,0,0,sr*2);
    glow.addColorStop(0,'rgba(180,0,255,0.22)');
    glow.addColorStop(1,'rgba(180,0,255,0)');
    cx.beginPath();cx.arc(0,0,sr*2,0,TAU);cx.fillStyle=glow;cx.fill();
    const spikes=6;
    const outerR=sr*(db.frame<4?1.0:0.88);
    const innerR=sr*0.3;
    cx.beginPath();
    for(let i=0;i<spikes*2;i++){
      const a=(i/spikes)*Math.PI;
      const rad=i%2===0?outerR:innerR;
      if(i===0)cx.moveTo(Math.cos(a)*rad,Math.sin(a)*rad);
      else cx.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);
    }
    cx.closePath();
    cx.fillStyle=db.frame<4?'rgba(160,0,255,0.25)':'rgba(200,40,255,0.32)';cx.fill();
    cx.strokeStyle=db.frame<4?'#aa00ff':'#dd44ff';cx.lineWidth=1.6;cx.stroke();
    cx.rotate(Math.PI/spikes);
    cx.beginPath();
    for(let i=0;i<spikes*2;i++){
      const a=(i/spikes)*Math.PI;
      const rad=i%2===0?sr*0.6:sr*0.15;
      if(i===0)cx.moveTo(Math.cos(a)*rad,Math.sin(a)*rad);
      else cx.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);
    }
    cx.closePath();
    cx.fillStyle='rgba(200,80,255,0.18)';cx.fill();
    cx.strokeStyle='rgba(220,120,255,0.55)';cx.lineWidth=1;cx.stroke();
    cx.beginPath();cx.arc(0,0,sr*0.25,0,TAU);
    cx.fillStyle=db.frame<4?'#cc00ff':'#ff44ff';cx.fill();
    cx.rotate(-db.rot);
    cx.globalAlpha=1;
    cx.font=`${Math.max(8,sr*1.1)}px serif`;
    cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText('📉',0,0);
    cx.globalAlpha=1;
    cx.restore();
  });
}

function drawBossBlob(blob,isMain){
  const r=blobR(blob);
  const sr=r*cam.z*blob.scale;
  const[sx,sy]=w2s(blob.x,blob.y);
  if(sx+sr+80<0||sx-sr-80>W||sy+sr+80<0||sy-sr-80>H)return;
  wobble(blob.pts,1+r*0.001);
  blob.scale+=(1-blob.scale)*0.10+blob.scaleVel;blob.scaleVel*=0.75;
  blob.sqX+=(1-blob.sqX)*0.12;blob.sqY+=(1-blob.sqY)*0.12;
  const glowPulse=0.5+0.5*Math.sin(Date.now()*0.004);
  cx.save();
  cx.beginPath();cx.arc(sx,sy,sr*1.18,0,TAU);
  cx.fillStyle=`rgba(204,34,68,${0.06+glowPulse*0.08})`;cx.fill();
  blobPath(blob.pts,sx,sy,sr,blob.sqX,blob.sqY);
  cx.fillStyle=BOSS_COLOR;cx.fill();
  const g=cx.createRadialGradient(sx-sr*0.25,sy-sr*0.28,sr*0.04,sx,sy,sr*1.05);
  g.addColorStop(0,'rgba(255,255,255,0.18)');g.addColorStop(1,'rgba(255,255,255,0)');
  blobPath(blob.pts,sx,sy,sr,blob.sqX,blob.sqY);cx.fillStyle=g;cx.fill();
  if(sr>18){
    cx.fillStyle='rgba(255,255,255,0.92)';
    cx.font=`900 ${clamp(sr*0.22,10,22)}px monospace`;
    cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText('CORP',sx,sy);
  }
  cx.restore();
}

function drawBossHUD(timer){
  if(!bossBlobs.length)return;
  const cx2=bossBlobs.reduce((s,b)=>s+b.x,0)/bossBlobs.length;
  const cy2=bossBlobs.reduce((s,b)=>s+b.y,0)/bossBlobs.length;
  const mainR=Math.max(...bossBlobs.map(b=>blobR(b)*b.scale));
  const[sx,sy]=w2s(cx2,cy2);
  const barW=Math.max(mainR*cam.z*2,80);
  const barH=5;
  const bx2=sx-barW/2,by2=sy-mainR*cam.z-18;
  const frac=timer/BOSS_DURATION;
  cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(bx2,by2,barW,barH);
  cx.fillStyle=`hsl(${frac*30},90%,55%)`;cx.fillRect(bx2,by2,barW*frac,barH);
}

function drawBossDyingBlob(db){
  db.dyingT+=0.12;
  db.x=db.x+(db.dyingTargetX-db.x)*0.18;
  db.y=db.y+(db.dyingTargetY-db.y)*0.18;
  db.scale*=0.82;
  db.sqX=1+Math.sin(db.dyingT*Math.PI)*0.35;
  db.sqY=1-Math.sin(db.dyingT*Math.PI)*0.25;
  const r=blobR(db);const sr=r*cam.z*db.scale;
  if(sr<1)return;
  const[sx,sy]=w2s(db.x,db.y);
  cx.save();
  cx.globalAlpha=Math.max(0,(1-db.dyingT)*0.9);
  blobPath(db.pts,sx,sy,sr,db.sqX,db.sqY);
  cx.fillStyle=BOSS_COLOR;cx.fill();
  cx.globalAlpha=1;cx.restore();
}

function bossDoSplit(blob){
  if(bossBlobs.filter(b=>b.alive).length>=BOSS_MAX_BLOBS)return;
  if(blob.m<800)return;
  let tx=MAP/2,ty=MAP/2;
  if(blobs.length){tx=blobs.reduce((s,b)=>s+b.x,0)/blobs.length;ty=blobs.reduce((s,b)=>s+b.y,0)/blobs.length;}
  const dx=tx-blob.x,dy=ty-blob.y,d=Math.hypot(dx,dy)||1;
  const half=blob.m/2;
  blob.m=half;blob.mergeT=BOSS_MERGE_COOLDOWN;
  blob.sqX=0.78;blob.sqY=1.3;blob.scale=0.92;blob.scaleVel=0.04;
  const nb=mkBossBlob(blob.x+dx/d*blobR(blob),blob.y+dy/d*blobR(blob),half,BOSS_MERGE_COOLDOWN);
  nb.scale=1.5;nb.scaleVel=-0.09;nb.sqX=1.5;nb.sqY=0.7;nb.vx=dx/d*11;nb.vy=dy/d*11;
  bossBlobs.push(nb);
}

function updateBossBlob(blob,bossTimer,isMain){
  blob.mergeT=Math.max(0,blob.mergeT-1);
  blob.spd+=(getStage(blob.m).speed-blob.spd)*0.03;
  const br=blobR(blob);
  let nearestPlayer=null,nearestDist=Infinity;
  blobs.forEach(pb=>{const d=Math.hypot(pb.x-blob.x,pb.y-blob.y);if(d<nearestDist){nearestDist=d;nearestPlayer=pb;}});
  const pr=nearestPlayer?blobR(nearestPlayer):0;
  const mainBlob=bossBlobs.find(b=>b.alive)||blob;
  const distToMain=Math.hypot(blob.x-mainBlob.x,blob.y-mainBlob.y);
  let tx,ty;
  if(nearestPlayer&&nearestDist<BOSS_CHASE_R){
    if(br>pr*1.1){tx=nearestPlayer.x;ty=nearestPlayer.y;}
    else if(br<pr*0.9){tx=blob.x-(nearestPlayer.x-blob.x)*2;ty=blob.y-(nearestPlayer.y-blob.y)*2;}
    else{tx=mainBlob.x;ty=mainBlob.y;}
  } else if(!isMain&&distToMain>400){tx=mainBlob.x;ty=mainBlob.y;}
  else{
    blob.roamTimer--;
    if(blob.roamTimer<=0||Math.hypot(blob.x-blob.roamX,blob.y-blob.roamY)<80){
      blob.roamX=rnd(200,MAP-200);blob.roamY=rnd(200,MAP-200);blob.roamTimer=rnd(180,360);
    }
    tx=blob.roamX;ty=blob.roamY;
  }
  const dx=tx-blob.x,dy=ty-blob.y,d=Math.hypot(dx,dy)||1;
  const prevVx=blob.vx,prevVy=blob.vy;
  blob.x+=dx/d*Math.min(blob.spd,d);blob.y+=dy/d*Math.min(blob.spd,d);
  blob.vx*=0.84;blob.vy*=0.84;blob.x+=blob.vx;blob.y+=blob.vy;
  const dot=(prevVx*blob.vx+prevVy*blob.vy);
  if(dot<-0.1){blob.sqX=1.22;blob.sqY=0.82;}
  if(blob.x-br<0){blob.x=br;blob.vx=Math.abs(blob.vx)*0.75;blob.sqX=1.28;blob.sqY=0.76;}
  if(blob.x+br>MAP){blob.x=MAP-br;blob.vx=-Math.abs(blob.vx)*0.75;blob.sqX=1.28;blob.sqY=0.76;}
  if(blob.y-br<0){blob.y=br;blob.vy=Math.abs(blob.vy)*0.75;blob.sqX=0.76;blob.sqY=1.28;}
  if(blob.y+br>MAP){blob.y=MAP-br;blob.vy=-Math.abs(blob.vy)*0.75;blob.sqX=0.76;blob.sqY=1.28;}

  const nearFoodIdxs=foodsNear(blob.x,blob.y,br);
  nearFoodIdxs.forEach(i=>{
    const f=foods[i];
    if(Math.hypot(f.x-blob.x,f.y-blob.y)<br+f.r*0.5){blob.m+=f.r*f.r;Object.assign(f,mkFood());}
  });

  nullBlobs.forEach(nb=>{
    if(!nb.alive)return;
    if(Math.hypot(blob.x-nb.x,blob.y-nb.y)<br+nb.r*0.4&&br>nb.r*0.85){blob.m+=nb.m*0.55;nb.alive=false;}
  });
  blobs.forEach(pb=>{
    if(!pb.alive)return;
    const pr2=blobR(pb);
    if(Math.hypot(blob.x-pb.x,blob.y-pb.y)<br+pr2*0.5&&br>pr2*1.1){
      blob.m+=pb.m;blob.sqX=1.28;blob.sqY=0.76;blob.scale=1.12;blob.scaleVel=-0.02;pb.alive=false;
    }
  });
  blobs.forEach(pb=>{
    if(!pb.alive)return;
    const pr2=blobR(pb);
    if(Math.hypot(blob.x-pb.x,blob.y-pb.y)<pr2+br*0.5&&pr2>br*1.1){
      pb.m+=blob.m*0.5;
      const dying={...blob,dying:true,dyingT:0,dyingTargetX:pb.x,dyingTargetY:pb.y};
      bossDyingBlobs.push(dying);blob.alive=false;
      pb.sqX=1.28;pb.sqY=0.76;pb.scale=1.12;pb.scaleVel=-0.02;
    }
  });
  blob.bombTimer--;
  if(blob.bombTimer<=0){drainBombs.push(mkMine(blob.x,blob.y));blob.bombTimer=BOSS_BOMB_INTERVAL;}
  if(blob.m>BOSS_SPLIT_MASS_THRESH&&bossBlobs.filter(b=>b.alive).length<BOSS_MAX_BLOBS){bossDoSplit(blob);}
}

function updateBossMerge(){
  const alive=bossBlobs.filter(b=>b.alive);
  for(let i=0;i<alive.length;i++){
    for(let j=i+1;j<alive.length;j++){
      const a=alive[i],b=alive[j];
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||0.001;
      const minD=blobR(a)+blobR(b);
      if(d<minD){
        if(a.mergeT>0||b.mergeT>0){
          const push=(minD-d)*0.45;
          a.x-=dx/d*push;a.y-=dy/d*push;b.x+=dx/d*push;b.y+=dy/d*push;
        } else {
          const big=a.m>=b.m?a:b;const sm=a.m>=b.m?b:a;
          const dying={...sm,dying:true,dyingT:0,dyingTargetX:big.x,dyingTargetY:big.y};
          bossDyingBlobs.push(dying);
          big.sqX=1.28;big.sqY=0.76;big.scale=1.12;big.scaleVel=-0.02;
          big.m+=sm.m;sm.alive=false;
        }
      }
    }
  }
}

function mineBlastPlayer(blob){
  if(!blob.alive)return;
  const stage=getStage(blob.m);
  if(blob.m<200||stage.splits<=1)return;
  const totalMassIn=blob.m;blob.alive=false;
  const slots=Math.min(stage.splits,16-blobs.filter(b=>b.alive).length);
  const frag=totalMassIn/slots;
  for(let i=0;i<slots;i++){
    const a=TAU/slots*i+rnd(-0.3,0.3);const dist=blobR(blob)*0.65;
    const nb=mkBlob(clamp(blob.x+Math.cos(a)*dist,10,MAP-10),clamp(blob.y+Math.sin(a)*dist,10,MAP-10),frag,stage.cooldown);
    nb.scale=1.7;nb.scaleVel=-0.1;nb.sqX=1.4;nb.sqY=0.7;nb.vx=Math.cos(a)*9;nb.vy=Math.sin(a)*9;
    blobs.push(nb);
  }
}

function mineBlastNull(nb){
  if(!nb.alive)return;nb.alive=false;
  if(nb.m<400)return;
  const pieces=2+Math.floor(Math.random()*2);
  const fragM=nb.m/pieces;
  for(let i=0;i<pieces;i++){
    const a=TAU/pieces*i+rnd(-0.4,0.4);
    const child=mkNull();
    child.x=clamp(nb.x+Math.cos(a)*nb.r*0.6,80,MAP-80);
    child.y=clamp(nb.y+Math.sin(a)*nb.r*0.6,80,MAP-80);
    child.m=fragM;child.r=Math.sqrt(fragM);
    child.vx=Math.cos(a)*3.5;child.vy=Math.sin(a)*3.5;
    child.scale=0.05;child.scaleVel=0.1;
    nullBlobs.push(child);
  }
}

let bossTimer=BOSS_DURATION;

function updateBoss(){
  if(!bossBlobs.length){
    bossSpawnCountdown--;
    if(bossSpawnCountdown<=0){spawnBoss();bossTimer=BOSS_DURATION;}
    return;
  }
  bossTimer--;
  if(bossTimer<=0){bossBlobs=[];bossDyingBlobs=[];bossSpawnCountdown=BOSS_APPEAR;return;}
  bossBlobs.forEach((blob,i)=>{if(blob.alive)updateBossBlob(blob,bossTimer,i===0);});
  updateBossMerge();
  drainBombs.forEach(db=>{
    db.life--;
    let nearestTarget=null,nearestDist=Infinity,targetType=null;
    blobs.forEach(pb=>{const d=Math.hypot(db.x-pb.x,db.y-pb.y);if(d<MINE_SEEK_R&&d<nearestDist){nearestDist=d;nearestTarget=pb;targetType='player';}});
    nullBlobs.forEach(nb=>{
      if(!nb.alive)return;
      const d=Math.hypot(db.x-nb.x,db.y-nb.y);
      if(d<MINE_SEEK_R&&d<nearestDist){nearestDist=d;nearestTarget=nb;targetType='null';}
    });
    if(nearestTarget){
      const dx=nearestTarget.x-db.x,dy=nearestTarget.y-db.y,d=Math.hypot(dx,dy)||1;
      db.vx+=(dx/d*MINE_SPEED-db.vx)*0.12;db.vy+=(dy/d*MINE_SPEED-db.vy)*0.12;
    } else {db.vx*=0.97;db.vy*=0.97;}
    db.x+=db.vx;db.y+=db.vy;
    db.x=((db.x%MAP)+MAP)%MAP;db.y=((db.y%MAP)+MAP)%MAP;
    blobs.forEach(pb=>{
      if(!pb.alive)return;
      if(Math.hypot(db.x-pb.x,db.y-pb.y)<db.r+blobR(pb)*0.8){mineBlastPlayer(pb);db.life=0;}
    });
    nullBlobs.forEach(nb=>{
      if(!nb.alive||db.life<=0)return;
      if(Math.hypot(db.x-nb.x,db.y-nb.y)<db.r+nb.r*0.8){mineBlastNull(nb);db.life=0;}
    });
  });
  drainBombs=drainBombs.filter(db=>db.life>0);
  bossBlobs=bossBlobs.filter(b=>b.alive);
  bossDyingBlobs=bossDyingBlobs.filter(db=>db.scale>0.04&&db.dyingT<1.0);
  if(!bossBlobs.length){bossSpawnCountdown=BOSS_APPEAR;}
}

function mkFood(){
  return{
    x:rnd(20,MAP-20),
    y:rnd(20,MAP-20),
    r:rnd(5,9),
    col:PAL[Math.floor(Math.random()*PAL.length)]
  };
}
function initFoods(){foods=Array.from({length:FOOD_COUNT},mkFood);}
function mkBomb(){return{x:rnd(150,MAP-150),y:rnd(150,MAP-150),r:30,rot:rnd(0,Math.PI),frame:0};}
function initBombs(){bombs=Array.from({length:BOMB_COUNT},mkBomb);}
function initNulls(){const cx2=MAP/2,cy2=MAP/2;nullBlobs=Array.from({length:NULL_COUNT},()=>mkNull(cx2,cy2));}
function initPlayer(){pColor=PAL[Math.floor(Math.random()*PAL.length)];blobs=[mkBlob(MAP/2,MAP/2,300,0)];}
function totalMass(){return blobs.reduce((s,b)=>s+b.m,0);}

function familyBounds(){
  if(!blobs.length)return{cx:MAP/2,cy:MAP/2,w:0,h:0};
  let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;
  blobs.forEach(b=>{const r=blobR(b);x0=Math.min(x0,b.x-r);x1=Math.max(x1,b.x+r);y0=Math.min(y0,b.y-r);y1=Math.max(y1,b.y+r);});
  return{cx:(x0+x1)/2,cy:(y0+y1)/2,w:x1-x0,h:y1-y0};
}

function updateCam(){
  if(!blobs.length)return;
  const fam=familyBounds();
  cam.x+=(fam.cx-cam.x)*0.08;cam.y+=(fam.cy-cam.y)*0.08;
  const stage=getStage(totalMass());
  const zStage=stage.zoomBase;
  let zSpread=zStage;
  if(fam.w>1||fam.h>1){const pw=W*(1-PAD*2),ph=H*(1-PAD*2);zSpread=clamp(Math.min(pw/fam.w,ph/fam.h),0.1,1.3);}
  cam.z+=(Math.min(zStage,zSpread)-cam.z)*0.055;
}
function w2s(wx,wy){return[(wx-cam.x)*cam.z+W/2,(wy-cam.y)*cam.z+H/2];}
function wobble(pts,s){pts.forEach(p=>{p.offset+=p.vel*s;if(Math.abs(p.offset)>0.13)p.vel*=-1;});}

function blobPath(pts,sx,sy,sr,sqX,sqY){
  const n=pts.length;
  const ps=pts.map(p=>{const pr=sr*(1+p.offset);return[sx+Math.cos(p.angle)*pr*sqX,sy+Math.sin(p.angle)*pr*sqY];});
  cx.beginPath();
  for(let i=0;i<n;i++){
    const p0=ps[(i-1+n)%n],p1=ps[i],p2=ps[(i+1)%n],p3=ps[(i+2)%n];
    if(i===0)cx.moveTo(p1[0],p1[1]);
    cx.bezierCurveTo(p1[0]+(p2[0]-p0[0])/6,p1[1]+(p2[1]-p0[1])/6,p2[0]-(p3[0]-p1[0])/6,p2[1]-(p3[1]-p1[1])/6,p2[0],p2[1]);
  }
  cx.closePath();
}

function drawBlob(blob){
  const r=blobR(blob);const sr=r*cam.z*blob.scale;
  const[sx,sy]=w2s(blob.x,blob.y);
  if(sx+sr+60<0||sx-sr-60>W||sy+sr+60<0||sy-sr-60>H)return;
  wobble(blob.pts,1+r*0.0018);
  blob.scale+=(1-blob.scale)*0.14+blob.scaleVel;blob.scaleVel*=0.72;
  blob.sqX+=(1-blob.sqX)*0.14;blob.sqY+=(1-blob.sqY)*0.14;
  cx.save();
  blobPath(blob.pts,sx,sy,sr,blob.sqX,blob.sqY);cx.fillStyle=pColor;cx.fill();
  if(canvasImg){
    cx.save();cx.beginPath();cx.arc(sx,sy,sr*0.82,0,TAU);cx.clip();
    const ir=sr*0.82;cx.drawImage(canvasImg,sx-ir,sy-ir,ir*2,ir*2);cx.restore();
  }
  const g=cx.createRadialGradient(sx-sr*0.25,sy-sr*0.25,sr*0.04,sx,sy,sr*1.05);
  g.addColorStop(0,'rgba(255,255,255,0.22)');g.addColorStop(1,'rgba(255,255,255,0)');
  blobPath(blob.pts,sx,sy,sr,blob.sqX,blob.sqY);cx.fillStyle=g;cx.fill();
  cx.restore();
}

function drawDyingBlob(db){
  db.dyingT+=0.12;
  const t=clamp(db.dyingT,0,1);const ease=t*t;
  db.x=db.x+(db.dyingTargetX-db.x)*0.18;db.y=db.y+(db.dyingTargetY-db.y)*0.18;
  db.scale*=0.82;db.sqX=1+Math.sin(t*Math.PI)*0.35;db.sqY=1-Math.sin(t*Math.PI)*0.25;
  const r=blobR(db);const sr=r*cam.z*db.scale;if(sr<1)return;
  const[sx,sy]=w2s(db.x,db.y);
  cx.save();cx.globalAlpha=Math.max(0,(1-ease)*0.9);
  blobPath(db.pts,sx,sy,sr,db.sqX,db.sqY);cx.fillStyle=pColor;cx.fill();
  if(canvasImg&&sr>10){
    cx.save();cx.beginPath();cx.arc(sx,sy,sr*0.82,0,TAU);cx.clip();
    const ir=sr*0.82;cx.drawImage(canvasImg,sx-ir,sy-ir,ir*2,ir*2);cx.restore();
  }
  cx.globalAlpha=1;cx.restore();
}

  const n=nb.pts.length;

  cx.beginPath();
  for(let i=0;i<n;i++){
    const p0=ps[(i-1+n)%n],p1=ps[i],p2=ps[(i+1)%n],p3=ps[(i+2)%n];
    if(i===0)cx.moveTo(p1[0],p1[1]);
    cx.bezierCurveTo(p1[0]+(p2[0]-p0[0])/6,p1[1]+(p2[1]-p0[1])/6,p2[0]-(p3[0]-p1[0])/6,p2[1]-(p3[1]-p1[1])/6,p2[0],p2[1]);
  }
  cx.closePath();

  }

    cx.font=`700 ${fs}px 'Share Tech Mono',monospace`;
    const tw=cx.measureText(nb.objection).width;

    cx.fillStyle='rgba(0,0,0,0.85)';

    cx.strokeStyle=nb.objectionGreen?'rgba(0,255,136,0.9)':'rgba(255,34,68,0.9)';cx.lineWidth=1.2;cx.stroke();
    cx.shadowBlur=0;
    cx.fillStyle=nb.objectionGreen?'#00ff88':'#ffffff';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(nb.objection,sx,by2+bh/2);
    cx.globalAlpha=1;cx.restore();
  }
}

function drawClosingTexts(){

function drawGrid(){

function drawFoods(){
  const buckets={};
  foods.forEach(f=>{
    const[sx,sy]=w2s(f.x,f.y);const sr=f.r*cam.z;
    if(sx+sr<0||sx-sr>W||sy+sr<0||sy-sr>H)return;
    const fs=Math.max(4,Math.round(sr*1.9));
    if(!buckets[fs])buckets[fs]=[];
    buckets[fs].push({sx,sy,col:f.col});
  });
  cx.textAlign='center';cx.textBaseline='middle';
  for(const fs in buckets){
    cx.font=`900 ${fs}px monospace`;
    buckets[fs].forEach(({sx,sy,col})=>{
      cx.fillStyle=col;
      cx.fillText('$',sx,sy);
    });
  }
}

function drawBombs(){
  bombs.forEach(b=>{
    b.rot=(b.rot+0.04)%TAU;b.frame=(b.frame+1)%8;
    const[sx,sy]=w2s(b.x,b.y);const sr=b.r*cam.z;
    if(sx+sr+10<0||sx-sr-10>W||sy+sr+10<0||sy-sr-10>H)return;
    cx.save();cx.translate(sx,sy);cx.rotate(b.rot);
    const glow=cx.createRadialGradient(0,0,sr*0.2,0,0,sr*1.4);
    glow.addColorStop(0,'rgba(255,60,60,0.18)');glow.addColorStop(1,'rgba(255,60,60,0)');
    cx.beginPath();cx.arc(0,0,sr*1.4,0,TAU);cx.fillStyle=glow;cx.fill();
    const spikes=8;const outerR=sr*(b.frame<4?1.0:0.92);const innerR2=sr*(b.frame<4?0.28:0.34);
    cx.beginPath();
    for(let i=0;i<spikes*2;i++){
      const a=(i/spikes)*Math.PI;const rad=i%2===0?outerR:innerR2;
      if(i===0)cx.moveTo(Math.cos(a)*rad,Math.sin(a)*rad);
      else cx.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);
    }
    cx.closePath();
    cx.fillStyle=b.frame<4?'rgba(255,50,50,0.22)':'rgba(255,80,30,0.28)';cx.fill();
    cx.strokeStyle=b.frame<4?'#ff3c3c':'#ff6622';cx.lineWidth=1.8;cx.stroke();
    cx.rotate(Math.PI/spikes);
    cx.beginPath();
    for(let i=0;i<spikes*2;i++){
      const a=(i/spikes)*Math.PI;const rad=i%2===0?sr*0.62:sr*0.18;
      if(i===0)cx.moveTo(Math.cos(a)*rad,Math.sin(a)*rad);
      else cx.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);
    }
    cx.closePath();
    cx.fillStyle='rgba(255,30,30,0.15)';cx.fill();cx.strokeStyle='rgba(255,80,80,0.6)';cx.lineWidth=1;cx.stroke();
    cx.beginPath();cx.arc(0,0,sr*0.22,0,TAU);cx.fillStyle=b.frame<4?'#ff3c3c':'#ff7744';cx.fill();
    cx.rotate(-b.rot);
    cx.font=`${Math.max(8,sr*1.1)}px serif`;cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText('⚠️',0,0);
    cx.restore();
  });
}

// ── MINIMAP food batching: persistent colour buckets, rebuilt every 6 frames ──
const _mmFoodByCol={};
let _mmLastFrame=-1;

function drawMinimap(){
  mc.clearRect(0,0,130,130);mc.fillStyle='rgba(5,5,8,0.92)';mc.fillRect(0,0,130,130);
  const s=130/MAP;

  // Rebuild colour buckets only every 6 frames (~10 fps for food dots).
  // Buckets store flat [x0,y0, x1,y1, …] pairs to avoid inner-object allocation.
  const frameNow=Math.floor(Date.now()/16);
  if(frameNow-_mmLastFrame>=6){
    _mmLastFrame=frameNow;
    for(const k in _mmFoodByCol)_mmFoodByCol[k].length=0;
    foods.forEach(f=>{
      if(!_mmFoodByCol[f.col])_mmFoodByCol[f.col]=[];
      _mmFoodByCol[f.col].push(f.x*s,f.y*s);
    });
  }
  // One beginPath + N arcs + one fill per colour = 10 draw calls instead of 2000.
  for(const col in _mmFoodByCol){
    const pts=_mmFoodByCol[col];if(!pts.length)continue;
    mc.beginPath();
    for(let i=0;i<pts.length;i+=2)mc.arc(pts[i],pts[i+1],1.2,0,TAU);
    mc.fillStyle=col;mc.fill();
  }

  bombs.forEach(b=>{mc.beginPath();mc.arc(b.x*s,b.y*s,2.5,0,TAU);mc.fillStyle='#ff3c3c';mc.fill();});
  nullBlobs.forEach(nb=>{if(!nb.alive)return;mc.beginPath();mc.arc(nb.x*s,nb.y*s,Math.max(1.5,nb.r*s*1.5),0,TAU);mc.fillStyle=nb.col;mc.fill();});
  bossBlobs.forEach(b=>{
    const br2=Math.max(4,blobR(b)*s*2.5);
    mc.beginPath();mc.arc(b.x*s,b.y*s,br2,0,TAU);mc.fillStyle=BOSS_COLOR;mc.fill();
    mc.strokeStyle='#ff88aa';mc.lineWidth=1;mc.stroke();
  });
  drainBombs.forEach(db=>{mc.beginPath();mc.arc(db.x*s,db.y*s,3,0,TAU);mc.fillStyle='#aa00ff';mc.fill();});
  hires.forEach(h=>{
    if(!h.alive)return;
    const hr=Math.max(2,blobR(h)*s*2);
    mc.beginPath();mc.arc(h.x*s,h.y*s,hr,0,TAU);
    mc.fillStyle=h.rogue?'#ff4455':(HIRE_COLORS[h.type]||'#fff');mc.fill();
  });
  adsigns.forEach(s2=>{mc.beginPath();mc.arc(s2.x*s,s2.y*s,3,0,TAU);mc.fillStyle='#ffffff';mc.fill();});
  blobs.forEach(b=>{
    const pr=Math.max(3,blobR(b)*s*2.5);
    const bx=b.x*s,by=b.y*s;
    mc.beginPath();mc.arc(bx,by,pr+3,0,TAU);mc.fillStyle=pColor;mc.globalAlpha=0.45;mc.fill();mc.globalAlpha=1;
    mc.beginPath();mc.arc(bx,by,pr,0,TAU);mc.fillStyle='#ffffff';mc.fill();
  });
  const vx=(cam.x-W/2/cam.z)*s,vy=(cam.y-H/2/cam.z)*s;
  mc.strokeStyle='rgba(0,255,204,0.45)';mc.lineWidth=1;mc.strokeRect(vx,vy,(W/cam.z)*s,(H/cam.z)*s);
}

// ── NULL AI ──
function updateNulls(){
  const FLEE_R=350,FLEE_F=0.32;
  let px=MAP/2,py=MAP/2;
  if(blobs.length){px=blobs.reduce((s,b)=>s+b.x,0)/blobs.length;py=blobs.reduce((s,b)=>s+b.y,0)/blobs.length;}
  nullBlobs.forEach(nb=>{
    if(!nb.alive)return;nb.r=Math.sqrt(nb.m);
    nb.headingTimer--;
    if(nb.headingTimer<=0){nb.heading+=rnd(-0.8,0.8);nb.headingTimer=rnd(80,200);}
    let nd=Infinity,near=null;
    blobs.forEach(b=>{const d=Math.hypot(b.x-nb.x,b.y-nb.y);if(d<nd){nd=d;near=b;}});
    const fleeing=near&&nd<FLEE_R&&blobR(near)>nb.r*0.75;
    if(fleeing){
      const dx=nb.x-near.x,dy=nb.y-near.y,d=Math.hypot(dx,dy)||1;
      const fleeAngle=Math.atan2(dy,dx);nb.heading+=(fleeAngle-nb.heading)*0.22;
      const f=FLEE_F*(1-nd/FLEE_R);nb.vx+=Math.cos(nb.heading)*f*4.5;nb.vy+=Math.sin(nb.heading)*f*4.5;
    } else {
      const targetVx=Math.cos(nb.heading)*2.2,targetVy=Math.sin(nb.heading)*2.2;
      nb.vx+=(targetVx-nb.vx)*0.06;nb.vy+=(targetVy-nb.vy)*0.06;
    }
    const spd=Math.hypot(nb.vx,nb.vy);const maxSpd=fleeing?4.5:2.6;
    if(spd>maxSpd){nb.vx=nb.vx/spd*maxSpd;nb.vy=nb.vy/spd*maxSpd;}
    nb.x+=nb.vx;nb.y+=nb.vy;
    if(nb.x-nb.r<0){nb.x=nb.r;nb.vx=Math.abs(nb.vx)*0.85;nb.heading=Math.atan2(nb.vy,Math.abs(nb.vx));}
    if(nb.x+nb.r>MAP){nb.x=MAP-nb.r;nb.vx=-Math.abs(nb.vx)*0.85;nb.heading=Math.atan2(nb.vy,-Math.abs(nb.vx));}
    if(nb.y-nb.r<0){nb.y=nb.r;nb.vy=Math.abs(nb.vy)*0.85;nb.heading=Math.atan2(Math.abs(nb.vy),nb.vx);}
    if(nb.y+nb.r>MAP){nb.y=MAP-nb.r;nb.vy=-Math.abs(nb.vy)*0.85;nb.heading=Math.atan2(-Math.abs(nb.vy),nb.vx);}
    let closestDist=Infinity;
    blobs.forEach(b=>{const d=Math.hypot(b.x-nb.x,b.y-nb.y);if(d<closestDist)closestDist=d;});
    if(closestDist<NULL_PROXIMITY){
      if(nb.objectionTimer<=0){
        nb.objection=OBJECTIONS_FLEE[Math.floor(Math.random()*OBJECTIONS_FLEE.length)];
        nb.objectionTimer=rnd(120,220);
      }
      nb.objectionAlpha=Math.min(1,nb.objectionAlpha+0.06);
    } else {
      nb.objectionAlpha=Math.max(0,nb.objectionAlpha-0.04);
      if(nb.objectionAlpha===0){nb.objection='';nb.objectionGreen=false;}
    }
    nb.objectionTimer=Math.max(0,nb.objectionTimer-1);
  });
  blobs.forEach(blob=>{
    const br=blobR(blob);
    nullBlobs.forEach(nb=>{
      if(!nb.alive)return;
      if(Math.hypot(blob.x-nb.x,blob.y-nb.y)<br+nb.r*0.4&&br>nb.r*0.85){
        const stageIdx=STAGES.findIndex(s=>totalMass()>=s.min&&totalMass()<s.max);
        const payoutMult=STAGE_PAYOUT[Math.max(0,stageIdx)]||1.0;
        blob.m+=nb.m*0.55*payoutMult;nb.alive=false;
        closingTexts.push({
          x:nb.x,y:nb.y,
          text:OBJECTIONS_CLOSE[Math.floor(Math.random()*OBJECTIONS_CLOSE.length)],
          alpha:1,vy:-1.2
        });
      }
    });
  });
  let alive=0;
  for(let i=0;i<nullBlobs.length;i++){if(nullBlobs[i].alive)nullBlobs[alive++]=nullBlobs[i];}
  nullBlobs.length=alive;
  while(nullBlobs.length<NULL_COUNT){nullBlobs.push(mkNull(px,py));}
}

// ── PLAYER PHYSICS ──
let foodGridDirty=true;

function updateBlobs(){
  const wx=(mouse.x-W/2)/cam.z+cam.x,wy=(mouse.y-H/2)/cam.z+cam.y;
  blobs.forEach(blob=>{
    blob.mergeT=Math.max(0,blob.mergeT-1);
    blob.spd+=(getStage(blob.m).speed-blob.spd)*0.03;
    const dx=wx-blob.x,dy=wy-blob.y,d=Math.hypot(dx,dy)||1;
    blob.x+=dx/d*Math.min(blob.spd,d);blob.y+=dy/d*Math.min(blob.spd,d);
    blob.vx*=0.84;blob.vy*=0.84;blob.x+=blob.vx;blob.y+=blob.vy;
    blob.x=clamp(blob.x,blobR(blob),MAP-blobR(blob));
    blob.y=clamp(blob.y,blobR(blob),MAP-blobR(blob));
  });
  for(let i=0;i<blobs.length;i++){
    for(let j=i+1;j<blobs.length;j++){
      const a=blobs[i],b=blobs[j];
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||0.001,minD=blobR(a)+blobR(b);
      if(d<minD){
        if(a.mergeT>0||b.mergeT>0){
          const push=(minD-d)*0.45;a.x-=dx/d*push;a.y-=dy/d*push;b.x+=dx/d*push;b.y+=dy/d*push;
        } else {
          const big=a.m>=b.m?a:b,sm=a.m>=b.m?b:a;
          const dying={...sm,dying:true,dyingT:0,dyingTargetX:big.x,dyingTargetY:big.y};
          dyingBlobs.push(dying);
          big.sqX=1.28;big.sqY=0.76;big.scale=1.12;big.scaleVel=-0.02;big.m+=sm.m;sm.alive=false;
        }
      }
    }
  }
  blobs=blobs.filter(b=>b.alive);
  dyingBlobs=dyingBlobs.filter(db=>db.scale>0.04&&db.dyingT<1.0);
  foodGridDirty=true;
}

function eatFood(){
  if(foodGridDirty){buildFoodGrid();foodGridDirty=false;}
  blobs.forEach(blob=>{
    const r=blobR(blob);
    const nearIdxs=foodsNear(blob.x,blob.y,r);
    nearIdxs.forEach(i=>{
      const f=foods[i];
      if(Math.hypot(f.x-blob.x,f.y-blob.y)<r+f.r*0.5){blob.m+=f.r*f.r*accountantMultiplier();Object.assign(f,mkFood());}
    });
  });
}

function bombBlast(blob,bomb){
  if(!blob.alive)return;
  const stage=getStage(blob.m);if(blob.m<200||stage.splits<=1)return;
  const totalMassIn=blob.m;blob.alive=false;
  const slots=Math.min(stage.splits,16-blobs.filter(b=>b.alive).length);
  const frag=totalMassIn/slots;
  for(let i=0;i<slots;i++){
    const a=TAU/slots*i+rnd(-0.25,0.25);const dist=blobR(blob)*0.65;
    const nb=mkBlob(clamp(blob.x+Math.cos(a)*dist,10,MAP-10),clamp(blob.y+Math.sin(a)*dist,10,MAP-10),frag,stage.cooldown);
    nb.scale=1.7;nb.scaleVel=-0.1;nb.sqX=1.4;nb.sqY=0.7;nb.vx=Math.cos(a)*8;nb.vy=Math.sin(a)*8;
    blobs.push(nb);
  }
  Object.assign(bomb,mkBomb());
}

function checkBossVsBombs(){
  bossBlobs.forEach(blob=>{
    if(!blob.alive)return;
    bombs.forEach(bomb=>{
      if(Math.hypot(bomb.x-blob.x,bomb.y-blob.y)<blobR(blob)+bomb.r*0.85){
        bossDoSplit(blob);blob.sqX=1.4;blob.sqY=0.7;blob.scale=1.2;blob.scaleVel=-0.08;
        Object.assign(bomb,mkBomb());
      }
    });
  });
}

function checkBombs(){
  blobs.forEach(blob=>{bombs.forEach(bomb=>{if(Math.hypot(bomb.x-blob.x,bomb.y-blob.y)<blobR(blob)+bomb.r*0.85)bombBlast(blob,bomb);});});
  blobs=blobs.filter(b=>b.alive);
}

function split(){
  if(!running)return;
  const wx=(mouse.x-W/2)/cam.z+cam.x,wy=(mouse.y-H/2)/cam.z+cam.y;
  const born=[];
  [...blobs].forEach(blob=>{
    if(blobs.length+born.length>=16||blob.m<400)return;
    const stage=getStage(blob.m);
    const dx=wx-blob.x,dy=wy-blob.y,d=Math.hypot(dx,dy)||1;
    const half=blob.m/2;blob.m=half;blob.mergeT=stage.cooldown;
    blob.sqX=0.78;blob.sqY=1.3;blob.scale=0.92;blob.scaleVel=0.04;
    const nb=mkBlob(blob.x+dx/d*blobR(blob),blob.y+dy/d*blobR(blob),half,stage.cooldown);
    nb.scale=1.5;nb.scaleVel=-0.09;nb.sqX=1.5;nb.sqY=0.7;nb.vx=dx/d*13;nb.vy=dy/d*13;
    born.push(nb);
  });
  blobs.push(...born);
}

function eject(){
  if(!running)return;
  const wx=(mouse.x-W/2)/cam.z+cam.x,wy=(mouse.y-H/2)/cam.z+cam.y;
  blobs.forEach(blob=>{
    if(blob.m<400)return;
    const dx=wx-blob.x,dy=wy-blob.y,d=Math.hypot(dx,dy)||1;
    blob.m-=Math.min(blob.m*0.08,200);
    foods.push({x:blob.x+dx/d*blobR(blob),y:blob.y+dy/d*blobR(blob),r:7,col:pColor});
    if(foods.length>FOOD_COUNT+80)foods.splice(0,1);
    foodGridDirty=true;
  });
}

// ── HIRE SYSTEM ──
const HIRE_COSTS={intern:800,closer:2500,ads:5000,commMgr:9000,accountant:15000,legal:35000};
let hires=[];
let adsigns=[];
let accountantTimer=0;
let legalOnRetainer=false;
let officePanelOpen=false;

const HIRE_COLORS={intern:'#aaaaaa',closer:'#ffd93d',ads:'#ff9f43',commMgr:'#4d96ff',legal:'#a29bfe'};
const HIRE_EMOJIS={intern:'🧑‍💻',closer:'🤝',commMgr:'🧲',legal:'⚖️'};
const ROGUE_THRESHOLD=8000;
const STAGE_PAYOUT=[0.3,0.5,0.7,1.0,1.4,2.0,3.0,5.0];

function mkHireBlob(type,x,y,mass){
  const lifespan=HIRE_LIFESPANS[type]||Infinity;
  const baseSpd=type==='intern'?7:type==='closer'?8:3;
  return{
    type,x,y,m:mass,vx:0,vy:0,
    pts:mkPts(12),alive:true,rogue:false,
    scale:0.05,scaleVel:0.1,sqX:1,sqY:1,
    mergeT:0,spd:baseSpd,
    roamX:x,roamY:y,roamTimer:0,
    legalTimer:type==='legal'?600:0,
    lifeTimer:lifespan,
    overlapTimer:0,
    internMissed:type==='intern'&&Math.random()<0.35,
    internNote:false,internNoteTimer:0,
    internWild:false,internWildTimer:0,
    heading:rnd(0,TAU),
    headingTimer:rnd(60,180),
    draggingNull:null,
  };
}

function spawnHire(type){
  const tm=totalMass();
  const cost=HIRE_COSTS[type];
  if(tm<cost)return;

  if(['intern','closer','ads','commMgr'].includes(type)&&hireCounts[type]>=4)return;

  let remaining=cost;
  blobs.forEach(b=>{if(remaining>0){const take=Math.min(b.m,remaining);b.m-=take;remaining-=take;}});

  const px=blobs.length?blobs[0].x:MAP/2;
  const py=blobs.length?blobs[0].y:MAP/2;

  if(type==='ads'){
    hireCounts.ads++;
    const ah=rnd(0,TAU);
    adsigns.push({x:px+rnd(-200,200),y:py+rnd(-200,200),timer:480,r:55,pulseT:0,
      vx:Math.cos(ah)*1.5,vy:Math.sin(ah)*1.5,heading:ah,headingTimer:rnd(80,200)});
    return;
  }
  if(type==='accountant'){
    accountantTimer=600;
    return;
  }
  if(type==='legal'){
    legalOnRetainer=true;
    return;
  }
  if(type==='intern'){
    hireCounts.intern++;
    const h=mkHireBlob('intern',px+rnd(-150,150),py+rnd(-150,150),1000);
    if(h.internMissed){
      closingTexts.push({x:px,y:py-80,text:'Sorry I missed work 🤦',alpha:1,vy:-0.6,green:false});
      hireCounts.intern--;
    } else {
      hires.push(h);
    }
    return;
  }
  if(type==='closer'){
    hireCounts.closer++;
    hires.push(mkHireBlob('closer',px+rnd(-100,100),py+rnd(-100,100),1000));
    return;
  }
  if(type==='commMgr'){
    hireCounts.commMgr++;
    hires.push(mkHireBlob('commMgr',px+rnd(-100,100),py+rnd(-100,100),1000));
    return;
  }
}

function deployLegalTeam(){
  if(!blobs.length)return;
  const px=blobs[0].x,py=blobs[0].y;
  const angles=[0,Math.PI/2,Math.PI,Math.PI*1.5];
  angles.forEach(a=>{
    const h=mkHireBlob('legal',px+Math.cos(a)*180,py+Math.sin(a)*180,1000);
    h.legalAngle=a;
    h.legalTimer=bossTimer;
    hires.push(h);
  });
  legalOnRetainer=false;
}

function updateHires(){
  if(legalOnRetainer&&bossBlobs.length&&!hires.some(h=>h.type==='legal'&&h.alive)){
    deployLegalTeam();
  }

  hires.forEach(h=>{
    if(!h.alive)return;
    const hr=blobR(h);

    if(h.type!=='legal'&&h.lifeTimer!==Infinity){
      h.lifeTimer--;
      if(h.lifeTimer<=0){
        h.alive=false;
        const labels={intern:'BURNED OUT 🔥',closer:'COMMISSION EXPIRED 📋',commMgr:'CONTRACT ENDED 📄'};
        closingTexts.push({x:h.x,y:h.y-50,text:labels[h.type]||'EXPIRED',alpha:1,vy:-0.7,green:false});
        return;
      }
    }

    if(h.type!=='legal'){
      let overlapping=false;
      blobs.forEach(pb=>{
        const d=Math.hypot(pb.x-h.x,pb.y-h.y);
        if(d<blobR(pb)+hr*0.6)overlapping=true;
      });
      if(overlapping){
        h.overlapTimer++;
        if(h.overlapTimer>=90){
          let closest=null,cd=Infinity;
          blobs.forEach(pb=>{const d=Math.hypot(pb.x-h.x,pb.y-h.y);if(d<cd){cd=d;closest=pb;}});
          if(closest)closest.m+=h.m;
          h.alive=false;
          closingTexts.push({x:h.x,y:h.y-50,text:'ABSORBED 💼',alpha:1,vy:-0.8,green:true});
          return;
        }
      } else {
        h.overlapTimer=0;
      }
    }

    if(h.type==='legal'){
      h.legalTimer=bossTimer;
      if(!bossBlobs.length||bossTimer<=0){h.alive=false;return;}
      if(blobs.length){
        const pb=blobs[0];
        h.legalAngle=(h.legalAngle||0)+0.008;
        const orbitR=blobR(pb)+120;
        const tx=pb.x+Math.cos(h.legalAngle)*orbitR;
        const ty=pb.y+Math.sin(h.legalAngle)*orbitR;
        const dx=tx-h.x,dy=ty-h.y,d=Math.hypot(dx,dy)||1;
        h.x+=dx/d*Math.min(4,d);h.y+=dy/d*Math.min(4,d);
      }
      bossBlobs.forEach(bb=>{
        const d=Math.hypot(bb.x-h.x,bb.y-h.y);
        const minD=blobR(bb)+hr;
        if(d<minD){
          const dx=bb.x-h.x,dy=bb.y-h.y,dn=Math.hypot(dx,dy)||1;
          bb.x+=dx/dn*(minD-d);bb.y+=dy/dn*(minD-d);
        }
      });
      h.m=Math.min(h.m+0.5,800);
    }

    if(h.type!=='legal'&&!h.rogue&&h.m>ROGUE_THRESHOLD){
      h.rogue=true;
      closingTexts.push({x:h.x,y:h.y-60,text:'I QUIT. Starting my own thing.',alpha:1,vy:-0.7,green:false});
    }

    if(h.type==='intern'){
      h.internWildTimer=Math.max(0,(h.internWildTimer||0)-1);
      if(Math.random()<0.0008&&!h.rogue){
        if(blobs.length){
          const pb=blobs[0];
          const dx=h.x-pb.x,dy=h.y-pb.y,d=Math.hypot(dx,dy)||1;
          h.vx+=dx/d*3;h.vy+=dy/d*3;
        }
      }
      if(Math.random()<0.0003){
        const bonus=rnd(2000,8000);
        if(blobs.length)blobs[0].m+=bonus;
        closingTexts.push({x:h.x,y:h.y-50,text:`WINDFALL +$${Math.round(bonus).toLocaleString()}!`,alpha:1,vy:-0.8,green:true});
      }
      if(Math.random()<0.0004){
        for(let i=0;i<8;i++)foods.push(mkFood());
        foodGridDirty=true;
        closingTexts.push({x:h.x,y:h.y-50,text:'Oops I spilled it...',alpha:1,vy:-0.6,green:false});
      }
    }

    if(h.type==='closer'&&!h.rogue){
      h.headingTimer--;
      if(h.headingTimer<=0){h.heading+=rnd(-0.8,0.8);h.headingTimer=rnd(80,200);}

      let nearestNull=null,nearestNullDist=Infinity;
      nullBlobs.forEach(nb=>{
        if(!nb.alive)return;
        const d=Math.hypot(nb.x-h.x,nb.y-h.y);
        if(d<nearestNullDist){nearestNullDist=d;nearestNull=nb;}
      });

      let distToPlayer=Infinity;
      let playerBlob=null;
      if(blobs.length){
        blobs.forEach(pb=>{const d=Math.hypot(pb.x-h.x,pb.y-h.y);if(d<distToPlayer){distToPlayer=d;playerBlob=pb;}});
      }

      if(nearestNull&&nearestNullDist<280){
        if(Math.random()<0.5){
          const dx=h.x-nearestNull.x,dy=h.y-nearestNull.y,dn=Math.hypot(dx,dy)||1;
          nearestNull.vx+=dx/dn*0.8;nearestNull.vy+=dy/dn*0.8;
          if(playerBlob){
            const dx2=playerBlob.x-h.x,dy2=playerBlob.y-h.y,d2=Math.hypot(dx2,dy2)||1;
            h.vx+=(dx2/d2*h.spd-h.vx)*0.08;h.vy+=(dy2/d2*h.spd-h.vy)*0.08;
          }
          nearestNull._draggedByCloser=h;
        } else {
          const dx=nearestNull.x-h.x,dy=nearestNull.y-h.y,d=Math.hypot(dx,dy)||1;
          h.vx+=(dx/d*h.spd-h.vx)*0.06;h.vy+=(dy/d*h.spd-h.vy)*0.06;
        }
        if(nearestNullDist<hr+nearestNull.r*0.5&&hr>nearestNull.r*0.85){
          h.m+=nearestNull.m*0.3;nearestNull.alive=false;
          if(blobs.length)blobs[0].m+=nearestNull.m*0.25;
        }
      } else if(distToPlayer>300&&playerBlob){
        const dx=playerBlob.x-h.x,dy=playerBlob.y-h.y,d=Math.hypot(dx,dy)||1;
        h.vx+=(dx/d*h.spd-h.vx)*0.06;h.vy+=(dy/d*h.spd-h.vy)*0.06;
      } else {
        const targetVx=Math.cos(h.heading)*h.spd,targetVy=Math.sin(h.heading)*h.spd;
        h.vx+=(targetVx-h.vx)*0.06;h.vy+=(targetVy-h.vy)*0.06;
      }
    }

    if(h.type==='intern'&&!h.rogue){
      let tx=h.roamX,ty=h.roamY;
      if(blobs.length){
        const pb=blobs[0];
        const dist=Math.hypot(h.x-pb.x,h.y-pb.y);
        if(dist>300){tx=pb.x;ty=pb.y;}
        else {
          h.roamTimer--;
          if(h.roamTimer<=0){h.roamX=pb.x+rnd(-200,200);h.roamY=pb.y+rnd(-200,200);h.roamTimer=rnd(80,200);}
          tx=h.roamX;ty=h.roamY;
        }
      }
      const dx=tx-h.x,dy=ty-h.y,d=Math.hypot(dx,dy)||1;
      h.x+=dx/d*Math.min(h.spd,d);h.y+=dy/d*Math.min(h.spd,d);
    }

    if(h.type==='commMgr'){
      h.vx*=0.9;h.vy*=0.9;h.x+=h.vx;h.y+=h.vy;
    }

    if(h.rogue){
      h.roamTimer--;
      if(h.roamTimer<=0){h.roamX=rnd(200,MAP-200);h.roamY=rnd(200,MAP-200);h.roamTimer=rnd(120,300);}
      const dx=h.roamX-h.x,dy=h.roamY-h.y,d=Math.hypot(dx,dy)||1;
      h.x+=dx/d*Math.min(2.5,d);h.y+=dy/d*Math.min(2.5,d);
      const nearF=foodsNear(h.x,h.y,hr);
      nearF.forEach(i=>{const f=foods[i];if(Math.hypot(f.x-h.x,f.y-h.y)<hr+f.r){h.m+=f.r*f.r;Object.assign(f,mkFood());}});
    }

    h.vx*=0.85;h.vy*=0.85;h.x+=h.vx;h.y+=h.vy;
    h.x=clamp(h.x,hr,MAP-hr);h.y=clamp(h.y,hr,MAP-hr);

    if(h.type!=='legal'&&!h.rogue){
      const nearF=foodsNear(h.x,h.y,hr);
      nearF.forEach(i=>{const f=foods[i];if(Math.hypot(f.x-h.x,f.y-h.y)<hr+f.r){h.m+=f.r*f.r*0.4;Object.assign(f,mkFood());}});
      foodGridDirty=true;
    }

    if(h.type==='commMgr'&&!h.rogue){
      nullBlobs.forEach(nb=>{
        if(!nb.alive)return;
        const d=Math.hypot(nb.x-h.x,nb.y-h.y);
        if(d<350){
          const dx=h.x-nb.x,dy=h.y-nb.y,dn=Math.hypot(dx,dy)||1;
          nb.vx+=dx/dn*0.3;nb.vy+=dy/dn*0.3;
          nb.objectionAlpha=Math.min(1,nb.objectionAlpha+0.04);
          if(nb.objectionTimer<=0){
            nb.objection=['Love this community!','Count me in!','This is great!','Sign me up!'][Math.floor(Math.random()*4)];
            nb.objectionTimer=rnd(100,200);
            nb.objectionGreen=true;
          }
        }
      });
    }

    bombs.forEach(bomb=>{
      if(Math.hypot(bomb.x-h.x,bomb.y-h.y)<hr+bomb.r*0.85){
        h.alive=false;
        closingTexts.push({x:h.x,y:h.y-50,text:'FIRED 💥',alpha:1,vy:-0.8,green:false});
        Object.assign(bomb,mkBomb());
      }
    });

    bossBlobs.forEach(bb=>{
      if(h.type==='legal')return;
      if(Math.hypot(bb.x-h.x,bb.y-h.y)<blobR(bb)+hr*0.5&&blobR(bb)>hr*1.1){
        bb.m+=h.m*0.3;h.alive=false;
        closingTexts.push({x:h.x,y:h.y-50,text:'ACQUIRED 😵',alpha:1,vy:-0.8,green:false});
      }
    });

    h.scale+=(1-h.scale)*0.12+h.scaleVel;h.scaleVel*=0.75;
    h.sqX+=(1-h.sqX)*0.12;h.sqY+=(1-h.sqY)*0.12;
  });

  const AD_FLEE_R=400,AD_FLEE_F=0.28;
  adsigns.forEach(s=>{
    s.timer--;s.pulseT+=0.08;
    s.headingTimer--;
    if(s.headingTimer<=0){s.heading+=rnd(-0.8,0.8);s.headingTimer=rnd(80,200);}
    let nearestDist=Infinity;
    let fleeing=false;
    blobs.forEach(pb=>{
      const d=Math.hypot(pb.x-s.x,pb.y-s.y);
      if(d<nearestDist){
        nearestDist=d;
        if(d<AD_FLEE_R){
          fleeing=true;
          const dx=s.x-pb.x,dy=s.y-pb.y,dn=Math.hypot(dx,dy)||1;
          const fleeAngle=Math.atan2(dy,dx);
          s.heading+=(fleeAngle-s.heading)*0.22;
          const f=AD_FLEE_F*(1-d/AD_FLEE_R);
          s.vx+=Math.cos(s.heading)*f*4;s.vy+=Math.sin(s.heading)*f*4;
        }
      }
    });
    if(!fleeing){
      const tvx=Math.cos(s.heading)*1.8,tvy=Math.sin(s.heading)*1.8;
      s.vx+=(tvx-s.vx)*0.05;s.vy+=(tvy-s.vy)*0.05;
    }
    const spd=Math.hypot(s.vx,s.vy);const maxSpd=fleeing?4:2;
    if(spd>maxSpd){s.vx=s.vx/spd*maxSpd;s.vy=s.vy/spd*maxSpd;}
    s.x+=s.vx;s.y+=s.vy;
    s.x=clamp(s.x,s.r,MAP-s.r);s.y=clamp(s.y,s.r,MAP-s.r);
    if(s.x<=s.r||s.x>=MAP-s.r)s.vx*=-0.6;
    if(s.y<=s.r||s.y>=MAP-s.r)s.vy*=-0.6;
    foods.forEach(f=>{
      const dx=s.x-f.x,dy=s.y-f.y,d=Math.hypot(dx,dy)||1;
      if(d<s.r*6){f.x+=dx/d*1.2;f.y+=dy/d*1.2;foodGridDirty=true;}
    });
  });

  const prevAdCount=adsigns.length;
  adsigns=adsigns.filter(s=>s.timer>0);
  const expiredAds=prevAdCount-adsigns.length;
  hireCounts.ads=Math.max(0,hireCounts.ads-expiredAds);

  if(accountantTimer>0)accountantTimer--;

  const typeCounts={intern:0,closer:0,commMgr:0};
  hires.forEach(h=>{if(h.alive&&h.type!=='legal')typeCounts[h.type]=(typeCounts[h.type]||0)+1;});
  hires=hires.filter(h=>h.alive);
  hireCounts.intern=typeCounts.intern||0;
  hireCounts.closer=typeCounts.closer||0;
  hireCounts.commMgr=typeCounts.commMgr||0;
}

function drawHires(){
  hires.forEach(h=>{
    if(!h.alive||h.type!=='closer'||h.rogue)return;
    nullBlobs.forEach(nb=>{
      if(!nb.alive||nb._draggedByCloser!==h)return;
      const[hsx,hsy]=w2s(h.x,h.y);
      const[nsx,nsy]=w2s(nb.x,nb.y);
      cx.save();
      cx.beginPath();cx.moveTo(hsx,hsy);cx.lineTo(nsx,nsy);
      cx.strokeStyle='rgba(255,215,0,0.55)';cx.lineWidth=1.5;
      cx.setLineDash([5,5]);cx.stroke();
      cx.setLineDash([]);cx.restore();
    });
  });
  hires.forEach(h=>{
    if(!h.alive||h.type!=='commMgr'||h.rogue)return;
    const[sx,sy]=w2s(h.x,h.y);
    const ringR=350*cam.z;
    cx.save();
    cx.beginPath();cx.arc(sx,sy,ringR,0,TAU);
    cx.strokeStyle='rgba(255,255,255,0.22)';cx.lineWidth=1.5;cx.stroke();
    cx.beginPath();cx.arc(sx,sy,ringR*0.85,0,TAU);
    cx.strokeStyle='rgba(255,255,255,0.08)';cx.lineWidth=1;cx.stroke();
    cx.restore();
  });
  nullBlobs.forEach(nb=>{nb._draggedByCloser=null;});

  hires.forEach(h=>{
    if(!h.alive)return;
    const r=blobR(h);const sr=r*cam.z*h.scale;
    const[sx,sy]=w2s(h.x,h.y);
    if(sx+sr+40<0||sx-sr-40>W||sy+sr+40<0||sy-sr-40>H)return;
    wobble(h.pts,0.9);
    cx.save();
    blobPath(h.pts,sx,sy,sr,h.sqX,h.sqY);
    cx.fillStyle=h.rogue?'#ff4455':pColor;cx.fill();
    const g=cx.createRadialGradient(sx-sr*0.25,sy-sr*0.25,sr*0.04,sx,sy,sr*1.05);
    g.addColorStop(0,'rgba(255,255,255,0.2)');g.addColorStop(1,'rgba(255,255,255,0)');
    blobPath(h.pts,sx,sy,sr,h.sqX,h.sqY);cx.fillStyle=g;cx.fill();
    if(sr>8){
      if(h.type==='commMgr'&&!h.rogue){
        cx.save();
        cx.beginPath();cx.arc(sx,sy,sr*0.72,0,TAU);cx.clip();
        if(canvasImg){
          cx.drawImage(canvasImg,sx-sr*0.72,sy-sr*0.8,sr*1.44,sr*1.44);
        } else {
          cx.fillStyle=pColor;cx.fillRect(sx-sr*0.72,sy-sr*0.72,sr*1.44,sr*1.44);
        }
        cx.restore();
        if(sr>14){
          cx.font=`900 ${clamp(sr*0.2,7,13)}px 'Share Tech Mono',monospace`;
          cx.textAlign='center';cx.textBaseline='middle';
          const lw=cx.measureText('COMMUNITY').width+8;
          cx.fillStyle='rgba(0,0,0,0.82)';cx.fillRect(sx-lw/2,sy+sr*0.4,lw,14);
          cx.fillStyle='#ffffff';cx.fillText('COMMUNITY',sx,sy+sr*0.4+7);
        }
      } else {
        const emoji=h.rogue?'💀':HIRE_EMOJIS[h.type];
        if(emoji){
          cx.font=`${clamp(sr*1.1,10,40)}px serif`;
          cx.textAlign='center';cx.textBaseline='middle';
          cx.fillText(emoji,sx,sy);
        }
      }
    }
    if(h.type==='legal'&&sr>8){
      const barW=sr*2,barH=3;
      const bx2=sx-barW/2,by2=sy-sr-8;
      cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(bx2,by2,barW,barH);
      cx.fillStyle='#a29bfe';cx.fillRect(bx2,by2,barW*(h.legalTimer/BOSS_DURATION),barH);
    }
    if(h.type!=='legal'&&HIRE_LIFESPANS[h.type]&&sr>8){
      const lifespan=HIRE_LIFESPANS[h.type];
      const barW=sr*2,barH=2;
      const bx2=sx-barW/2,by2=sy-sr-12;
      cx.fillStyle='rgba(0,0,0,0.4)';cx.fillRect(bx2,by2,barW,barH);
      const frac=Math.max(0,h.lifeTimer/lifespan);
      cx.fillStyle=frac>0.3?'rgba(0,255,180,0.7)':'rgba(255,80,80,0.8)';
      cx.fillRect(bx2,by2,barW*frac,barH);
    }
    if(h.overlapTimer>0&&sr>8){
      const frac=h.overlapTimer/90;
      cx.beginPath();
      cx.arc(sx,sy,sr+4,-Math.PI/2,-Math.PI/2+TAU*frac);
      cx.strokeStyle='rgba(0,255,204,0.85)';cx.lineWidth=2.5;cx.stroke();
    }
    cx.restore();
  });

  drawAdSigns();

  if(accountantTimer>0&&blobs.length){
    blobs.forEach(b=>{
      const r=blobR(b);const sr=r*cam.z;
      const[sx,sy]=w2s(b.x,b.y);
      cx.save();
      cx.globalAlpha=0.25+0.1*Math.sin(Date.now()*0.01);
      cx.beginPath();cx.arc(sx,sy,sr*1.3,0,TAU);
      cx.fillStyle='#ffd93d';cx.fill();
      cx.globalAlpha=1;cx.restore();
    });
    const fill=document.getElementById('accountantFill');
    if(fill)fill.style.width=(accountantTimer/600*100)+'%';
  } else {
    const fill=document.getElementById('accountantFill');
    if(fill)fill.style.width='0%';
  }
}

function accountantMultiplier(){return accountantTimer>0?2.2:1;}

function updatePanelButtons(){
  const tm=totalMass();
  const bossActive=bossBlobs.length>0;

  const internBtn=document.getElementById('hireIntern');
  internBtn.disabled=tm<HIRE_COSTS.intern||hireCounts.intern>=4;
  document.getElementById('cntIntern').textContent=`${hireCounts.intern}/4`;

  const closerBtn=document.getElementById('hireCloser');
  closerBtn.disabled=tm<HIRE_COSTS.closer||hireCounts.closer>=4;
  document.getElementById('cntCloser').textContent=`${hireCounts.closer}/4`;

  const adsBtn=document.getElementById('hireAds');
  adsBtn.disabled=tm<HIRE_COSTS.ads||hireCounts.ads>=4;
  document.getElementById('cntAds').textContent=`${hireCounts.ads}/4`;

  const commMgrBtn=document.getElementById('hireCommMgr');
  commMgrBtn.disabled=tm<HIRE_COSTS.commMgr||hireCounts.commMgr>=4;
  document.getElementById('cntCommMgr').textContent=`${hireCounts.commMgr}/4`;

  document.getElementById('hireAccountant').disabled=tm<HIRE_COSTS.accountant||accountantTimer>0;

  const legalBtn=document.getElementById('hireLegal');
  legalBtn.disabled=tm<HIRE_COSTS.legal||bossActive||legalOnRetainer;
  legalBtn.textContent=legalOnRetainer?'ON RETAINER':'RETAINER';
}

function checkRevenueBanner(currentMass){
  if(revenueAlertCooldown>0){revenueAlertCooldown--;return;}
  const gain=currentMass-lastMass;
  if(gain>=2000){
    raTitle.textContent=`+$${Math.round(gain).toLocaleString()} REVENUE!`;
    const phrases=['CLOSING DEALS','MONEY IN','HUSTLING','KILLING IT','CASH MONEY'];
    raSub.textContent=phrases[Math.floor(Math.random()*phrases.length)];
    revenueAlert.style.display='block';
    revenueAlertCooldown=180;
    setTimeout(()=>{revenueAlert.style.display='none';},2500);
  }
  lastMass=currentMass;
}

function loop(){
  if(!running)return;
  cx.fillStyle='#050508';cx.fillRect(0,0,W,H);
  drawGrid();drawBorder();drawFoods();drawBombs();
  nullBlobs.forEach(nb=>{if(nb.alive)drawNullBlob(nb);});
  dyingBlobs.forEach(db=>drawDyingBlob(db));
  bossDyingBlobs.forEach(db=>drawBossDyingBlob(db));
  drawMines();
  drawHires();
  bossBlobs.forEach((b,i)=>{if(b.alive)drawBossBlob(b,i===0);});
  if(bossBlobs.length)drawBossHUD(bossTimer);
  blobs.forEach(b=>{drawBlob(b);drawNameTag(b);});
  drawClosingTexts();

  if(!bossBlobs.length&&bossSpawnCountdown<180){
    const flashAlpha=0.18+0.12*Math.sin(Date.now()*0.018);
    const grad=cx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.9);
    grad.addColorStop(0,'rgba(200,0,40,0)');
    grad.addColorStop(1,`rgba(200,0,40,${flashAlpha})`);
    cx.fillStyle=grad;cx.fillRect(0,0,W,H);
    if(!bossAlertShown){
      bossAlert.style.display='block';bossAlertShown=true;
      setTimeout(()=>{bossAlert.style.display='none';},3500);
    }
  }
  if(!bossBlobs.length&&bossSpawnCountdown===BOSS_APPEAR){bossAlertShown=false;}

  updateBlobs();eatFood();checkBombs();checkBossVsBombs();updateNulls();updateBoss();updateHires();updateCam();

  const tm=totalMass(),st=getStage(tm);
  massN.textContent='$'+Math.round(tm).toLocaleString();
  stageN.textContent=st.name;
  spdN.textContent='SPD '+(blobs.length?blobs.reduce((s,b)=>s+b.spd,0)/blobs.length:0).toFixed(1);
  if(officePanelOpen)updatePanelButtons();

  checkRevenueBanner(tm);

  drawMinimap();

  if(blobs.length===0){endGame();return;}
  raf=requestAnimationFrame(loop);
}

function startGame(){
  pName=document.getElementById('nameIn').value.trim()||'Cell';
  over.style.display='none';dead.style.display='none';
  dyingBlobs=[];bossBlobs=[];bossDyingBlobs=[];closingTexts=[];
  hires=[];adsigns=[];accountantTimer=0;legalOnRetainer=false;
  hireCounts={intern:0,closer:0,ads:0,commMgr:0};
  bossSpawnCountdown=BOSS_APPEAR;bossBombTimer=0;drainBombs=[];bossTimer=BOSS_DURATION;
  revenueAlertCooldown=0;lastMass=300;
  revenueAlert.style.display='none';bossAlert.style.display='none';
  initFoods();initBombs();initNulls();initPlayer();
  cam={x:MAP/2,y:MAP/2,z:1};mouse={x:W/2,y:H/2};
  foodGridDirty=true;bossAlertShown=false;
  running=true;loop();
}

function endGame(){
  running=false;cancelAnimationFrame(raf);
  document.getElementById('dMsg').textContent='Final revenue: $'+Math.round(totalMass()||0).toLocaleString();
  dead.style.display='flex';
}

document.getElementById('playBtn').onclick=startGame;
document.getElementById('rBtn').onclick=startGame;
document.getElementById('nameIn').addEventListener('keydown',e=>{if(e.key==='Enter')startGame();});
document.getElementById('officeBtn').addEventListener('click',()=>{
  officePanelOpen=!officePanelOpen;
  document.getElementById('officePanel').style.display=officePanelOpen?'block':'none';
  document.getElementById('officeBtn').textContent=officePanelOpen?'▲ OFFICE PANEL':'▼ OFFICE PANEL';
  if(officePanelOpen)updatePanelButtons();
});
document.getElementById('hireIntern').addEventListener('click',()=>{if(running)spawnHire('intern');});
document.getElementById('hireCloser').addEventListener('click',()=>{if(running)spawnHire('closer');});
document.getElementById('hireAds').addEventListener('click',()=>{if(running)spawnHire('ads');});
document.getElementById('hireCommMgr').addEventListener('click',()=>{if(running)spawnHire('commMgr');});
document.getElementById('hireAccountant').addEventListener('click',()=>{if(running)spawnHire('accountant');});
document.getElementById('hireLegal').addEventListener('click',()=>{if(running)spawnHire('legal');});
window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
window.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();split();}
  if(e.code==='KeyW'){e.preventDefault();eject();}
});
})();
</script>
